name: Build and Release Windows EXE

# This workflow runs automatically when you push a "tag" like v1.0.0, v1.1.0, v2.0.3, ...
# It will: install Python -> install pillow + pyinstaller -> package main.py into a .exe
# -> create a new GitHub Release and attach the .exe file automatically.
# You do NOT need to install Python/pyinstaller on your own machine for this.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pillow pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --add-data "data;data" --name "ECU_Pinout_Tool" main.py

      - name: Create GitHub Release with EXE attached
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ECU_Pinout_Tool.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
